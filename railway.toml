# MarketForge AI — Railway Deployment Config
# Each service is deployed as a separate Railway service.

# ── FastAPI (web service) ──────────────────────────────────────────────────────
[build]
builder = "dockerfile"

[deploy]
startCommand = "gunicorn api.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

# Environment variables set in Railway dashboard (never commit):
# DATABASE_URL          — auto-set by Railway PostgreSQL addon
# DATABASE_URL_SYNC     — REQUIRED: same host/db as DATABASE_URL but use
#                         postgresql+psycopg2:// prefix (Railway does not set this
#                         automatically; derive it from DATABASE_URL and set manually)
# REDIS_URL             — auto-set by Railway Redis addon
# GEMINI_API_KEY        — Google AI Studio
# LANGCHAIN_API_KEY     — LangSmith
# LANGCHAIN_TRACING_V2  — true
# LANGCHAIN_PROJECT     — marketforge-ai
# ADZUNA_APP_ID         — Adzuna developer portal
# ADZUNA_APP_KEY        — Adzuna developer portal
# REED_API_KEY          — Reed developer portal
# TAVILY_API_KEY        — Tavily
# SMTP_HOST             — smtp.gmail.com
# SMTP_PORT             — 587
# SMTP_USER             — Gmail address
# SMTP_PASSWORD         — Gmail app password
# REPORT_RECIPIENT_EMAIL— target email for weekly report
# ENVIRONMENT           — production
# LOG_LEVEL             — INFO
# LOG_FORMAT            — json
# MLFLOW_TRACKING_URI   — http://mlflow-service.railway.internal:5001
